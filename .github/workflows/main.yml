name: Actualización Automática de Inventario

on:
  push:
    branches: [ main ]  # Se ejecuta cuando subes cambios
  schedule:
    - cron: '0 0 * * 1' # Se ejecuta automáticamente todos los lunes a las 00:00 UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy

    - name: Ejecutar Optimizador de Inventario
      run: python src/inventory_optimizer.py

    - name: Guardar cambios en el CSV
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/reporte_inventario.csv
        git commit -m "Auto-update: Reporte de inventario actualizado" || echo "No hay cambios para commitear"
        git push